<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>TOMI</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --bg-color: #ffffff; --ui-white: #ffffff; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; height: 100svh; background-color: var(--bg-color); transition: background-color 0.5s ease; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; -webkit-font-smoothing: antialiased; }
        body.dark-mode { --bg-color: #121212; }
        model-viewer { width: 100%; height: 100%; background-color: transparent; outline: none; display: block; }
        model-viewer::part(default-ar-button) { display: none !important; }

        .ui-element {
            position: absolute; background: none; border: none; padding: 0;
            cursor: pointer; z-index: 100;
            mix-blend-mode: difference;
            color: var(--ui-white) !important; 
            fill: var(--ui-white) !important;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .brand-btn { top: 32px; font-weight: 700; font-size: 15px; letter-spacing: 0.2em; text-transform: uppercase; }
        .brand-label { left: 32px; }
        .brand-czasowniki { right: 32px; text-align: right; }

        .info-panel {
            position: absolute; top: 65px; 
            color: var(--ui-white); mix-blend-mode: difference;
            opacity: 0; pointer-events: none; 
            transition: opacity 0.4s ease, transform 0.4s ease; 
            z-index: 90;
            font-weight: 200; 
            font-size: 14px;  
            line-height: 1.5; letter-spacing: 0.03em;
            text-transform: none;
            transform: translateY(-5px);
        }
        .info-panel.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
        #panel-strm { left: 32px; }
        #panel-czasowniki { right: 32px; text-align: right; max-width: 320px; }

        .icon-btn { width: 28px; height: 28px; bottom: 40px; display: flex; align-items: center; justify-content: center; }
        .icon-btn svg { width: 20px; height: 20px; }
        
        #ar-label { font-weight: 800; font-size: 16px; display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; }
        .btn-theme { left: 32px; }
        .btn-pause { left: 36%; transform: translateX(-50%); }
        .btn-action { left: 63%; transform: translateX(-50%); }
        .btn-reset { right: 32px; }

        @media (min-width: 769px) {
            .brand-btn { font-size: 19px; top: 40px; font-weight: 500; letter-spacing: 0.25em; }
            .info-panel { font-size: 16px; top: 85px; }
            #panel-czasowniki { max-width: 500px; }
            .icon-btn { width: 32px; height: 32px; }
            .icon-btn svg { width: 24px; height: 24px; }
            #ar-label { font-size: 20px; font-weight: 500; }
        }
    </style>
</head>
<body>

    <button class="ui-element brand-btn brand-label" id="toggle-strm">TOMI</button>
    <div id="panel-strm" class="info-panel">
        Mechanizm kwarcowy<br>215 x 215 x 40 mm<br>Druk 3D PLA
    </div>

    <button class="ui-element brand-btn brand-czasowniki" id="toggle-czasowniki">CZASOWNIKI</button>
    <div id="panel-czasowniki" class="info-panel">
        Obiekty kinetyczne badające granicę<br>między precyzyjną inżynierią,<br>a wizualnym absurdem.
    </div>

    <button class="ui-element icon-btn btn-theme" id="theme-toggle">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18V4c4.42 0 8 3.58 8 8s-3.58 8-8 8z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-pause" id="pause-toggle">
        <svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        <svg id="icon-play" viewBox="0 0 24 24" style="display:none;"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-action" id="action-toggle">
        <span id="ar-label" style="display:none;">AR</span>
        <svg id="fs-icon" viewBox="0 0 24 24" style="display:none;"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>

    <button class="ui-element icon-btn btn-reset" id="reset-view">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
    </button>

    <model-viewer 
        id="clock-model"
        src="TOMI.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls disable-pan
        shadow-intensity="1" shadow-softness="1"
        exposure="1.6" environment-intensity="1.8"
        autoplay
        interaction-prompt="none"
        camera-orbit="0deg 75deg 100%" 
        camera-target="0m 0.11m 0m"
        min-camera-orbit="auto auto 40%" 
        max-camera-orbit="auto auto 600%"
        loading="eager">
    </model-viewer>

    <script>
        const getEl = (id) => document.getElementById(id);
        const mv = getEl('clock-model');

        const CONFIG = {
            mobileOrbit: "180deg 75deg 90%",
            desktopOrbit: "180deg 75deg 100%",
            mobileTarget: "0m 0.14m 0m",
            desktopTarget: "0m 0.12m 0m"
        };

        getEl('reset-view').onclick = () => {
            const isMob = window.innerWidth < 768;
            mv.cameraOrbit = isMob ? CONFIG.mobileOrbit : CONFIG.desktopOrbit;
            mv.cameraTarget = isMob ? CONFIG.mobileTarget : CONFIG.desktopTarget;
        };

        const togglePanel = (showId, hideId) => {
            getEl(hideId).classList.remove('visible');
            getEl(showId).classList.toggle('visible');
        };

        getEl('toggle-strm').onclick = () => togglePanel('panel-strm', 'panel-czasowniki');
        getEl('toggle-czasowniki').onclick = () => togglePanel('panel-czasowniki', 'panel-strm');

        getEl('theme-toggle').onclick = () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            mv.exposure = isDark ? "1.6" : "2.8";
        };

        const pauseBtn = getEl('pause-toggle');
        pauseBtn.onclick = () => {
            if (pauseBtn.dataset.paused !== "true") {
                mv.pause();
                getEl('icon-pause').style.display = 'none';
                getEl('icon-play').style.display = 'block';
                pauseBtn.dataset.paused = "true";
            } else {
                mv.play();
                getEl('icon-pause').style.display = 'block';
                getEl('icon-play').style.display = 'none';
                pauseBtn.dataset.paused = "false";
            }
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            getEl('ar-label').style.display = 'flex';
            getEl('action-toggle').onclick = () => mv.activateAR();
        } else {
            getEl('fs-icon').style.display = 'block';
            getEl('action-toggle').onclick = () => {
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            };
        }
    </script>
</body>
</html>
